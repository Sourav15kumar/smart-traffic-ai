services:
  - type: web
    name: smart-traffic-ai
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python model.py"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0